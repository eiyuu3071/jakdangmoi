<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>밥</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="menu-image.css" />
  <link rel="stylesheet" href="menu-reviews.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>밥</h1>
        
      </div>
      <div class="actions">
        <button id="prevBtn" class="ghost">이전 달</button>
        <button id="todayBtn" class="solid">이번 달</button>
        <button id="nextBtn" class="ghost">다음 달</button>
      </div>
    </header>

    <section class="menu-board panel">
      <div class="menu-board-header">
        <div>
          <h2>메뉴</h2>
          
        </div>
        <div class="menu-board-actions">
          <label for="menuImageInput" class="button-like solid">이미지 선택</label>
          <button id="clearMenuImageBtn" class="ghost" type="button">이미지 지우기</button>
        </div>
      </div>

      <input id="menuImageInput" type="file" accept="image/*" hidden />

      <div id="menuImagePreview" class="menu-image-preview is-empty">
        <img id="menuImage" alt="선택한 메뉴표" hidden />
        <div id="menuImagePlaceholder" class="menu-image-placeholder">
          아직 등록된 메뉴 이미지가 없습니다.
        </div>
      </div>
      <div id="menuImageStatus" class="menu-image-status" aria-live="polite"></div>
    </section>

    <section class="review-board panel">
      <div class="review-board-header">
        <div>
          <h2>오늘의 리뷰</h2>
          
        </div>
        <label class="review-date-field">
          <span>날짜 선택</span>
          <input id="reviewDateInput" type="date" />
        </label>
      </div>

      <div class="review-summary">
        <div class="review-score-card">
          <span class="review-summary-label">평균 점수</span>
          <strong id="reviewAverageText">0.0</strong>
          <span id="reviewAverageStars" class="review-average-stars">☆☆☆☆☆</span>
        </div>
        <div class="review-score-card review-score-card-count">
          <span class="review-summary-label">리뷰 수</span>
          <strong id="reviewCountText">0개</strong>
          <span id="reviewSelectedDateText" class="review-selected-date"></span>
        </div>
      </div>

      <div id="reviewList" class="review-list"></div>
      <div id="reviewEmptyState" class="review-empty-state">아직 등록된 리뷰가 없습니다.</div>
      <div id="reviewStatus" class="review-status" aria-live="polite"></div>

      <form id="reviewForm" class="review-form">
        <div class="review-form-grid review-form-grid-three">
          <label class="field">
            <span>닉네임</span>
            <input id="reviewNicknameInput" type="text" maxlength="20" placeholder="예: 점심요정" required />
          </label>
          <div class="field">
            <span>별점</span>
            <div id="reviewStarPicker" class="review-star-picker" role="radiogroup" aria-label="별점 선택">
              <button type="button" class="review-star-btn" data-rating="1" aria-label="1점">☆</button>
              <button type="button" class="review-star-btn" data-rating="2" aria-label="2점">☆</button>
              <button type="button" class="review-star-btn" data-rating="3" aria-label="3점">☆</button>
              <button type="button" class="review-star-btn" data-rating="4" aria-label="4점">☆</button>
              <button type="button" class="review-star-btn" data-rating="5" aria-label="5점">☆</button>
            </div>
            <input id="reviewRatingInput" type="hidden" value="5" />
          </div>
          <label class="field">
            <span>비밀번호</span>
            <input id="reviewPasswordInput" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" placeholder="숫자 4자리" required />
          </label>
        </div>

        <label class="field">
          <span>리뷰 내용</span>
          <textarea id="reviewContentInput" rows="3" maxlength="200" placeholder="예: 오늘은 국물이 진하고 맛있었어요." required></textarea>
        </label>

        <div class="review-form-actions">
          <button id="reviewSubmitBtn" class="solid" type="submit">리뷰 등록</button>
        </div>
      </form>
    </section>

    <section class="meta">
      <div class="legend" id="legend"></div>
      <div class="tip">
        인원 선택, 일정 추가/삭제는 페이지에서 바로 가능합니다.
      </div>
    </section>

    <main id="calendar" class="calendar"></main>

    <aside class="sidebar">
      <div class="panel">
        <h2>인원 선택</h2>
        <div id="memberFilters" class="filters"></div>
      </div>

      <div class="panel">
        <h2>인원 관리</h2>
        <div class="panel-actions">
          <button id="openMemberModal" class="solid" type="button">인원 추가</button>
          <button id="openMemberDeleteModal" class="ghost" type="button">인원 삭제</button>
        </div>
      </div>

      <div class="panel">
        <h2>일정 등록</h2>
        <div class="panel-actions">
          <button id="openEventModal" class="solid" type="button">일정 추가</button>
          <button id="openEventDeleteModal" class="ghost" type="button">일정 삭제</button>
        </div>
      </div>

    </aside>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modalTitle">일정 상세</h3>
        <button id="modalClose" class="ghost">닫기</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <div id="memberModal" class="modal hidden">
    <div class="modal-backdrop" id="memberModalBackdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h3>인원 추가</h3>
        <button id="memberModalClose" class="ghost">닫기</button>
      </div>
      <form id="memberForm" class="form">
        <label class="field">
          <span>이름</span>
          <input id="memberNameInput" type="text" placeholder="예: 지훈" required />
        </label>
        <button class="solid" type="submit">추가</button>
      </form>
    </div>
  </div>

  <div id="memberDeleteModal" class="modal hidden">
    <div class="modal-backdrop" id="memberDeleteBackdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h3>인원 삭제</h3>
        <button id="memberDeleteClose" class="ghost">닫기</button>
      </div>
      <form id="memberDeleteForm" class="form">
        <div class="field">
          <span>삭제할 인원</span>
          <div id="memberDeleteList" class="select-list"></div>
        </div>
        <button class="delete-btn" type="submit">삭제</button>
      </form>
    </div>
  </div>

  <div id="eventModal" class="modal hidden">
    <div class="modal-backdrop" id="eventModalBackdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h3>일정 추가</h3>
        <button id="eventModalClose" class="ghost">닫기</button>
      </div>
      <form id="eventForm" class="form">
        <label class="field">
          <span>대상 인원(복수 선택)</span>
          <div id="memberSelect" class="filters"></div>
        </label>
        <label class="field">
          <span>구분</span>
          <select id="typeInput">
            <option value="휴가">휴가</option>
            <option value="출장">출장</option>
            <option value="약속">약속</option>
          </select>
        </label>
        <label class="field">
          <span>시작일</span>
          <input id="startInput" type="date" required />
        </label>
        <label class="field">
          <span>종료일</span>
          <input id="endInput" type="date" required />
        </label>
        <label class="field">
          <span>메모(선택)</span>
          <input id="noteInput" type="text" placeholder="예: 해외 파트너 미팅" />
        </label>
        <button class="solid" type="submit">추가</button>
      </form>
    </div>
  </div>

  <div id="eventDeleteModal" class="modal hidden">
    <div class="modal-backdrop" id="eventDeleteBackdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <h3>일정 삭제</h3>
        <button id="eventDeleteClose" class="ghost">닫기</button>
      </div>
      <form id="eventDeleteForm" class="form">
        <div class="field">
          <span>삭제할 일정</span>
          <div id="eventDeleteList" class="select-list"></div>
        </div>
        <button class="delete-btn" type="submit">삭제</button>
      </form>
    </div>
  </div>

  <script src="holidays-ko.js"></script>
  <script src="https://eiyuu3071.github.io/jakdangmoi/app.js?v=20260224-13" onerror="alert('app.js 로딩 실패')"></script>
  <script src="menu-image.js"></script>
  <script src="menu-reviews.js"></script>
  <script>
    setTimeout(() => {
      if (!window.APP_READY) {
        alert('스크립트가 실행되지 않았습니다. 새로고침 후 다시 시도하세요.');
      }
    }, 2000);
  </script>
</body>
</html>
